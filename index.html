<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVN Indian Estate | Dynamic Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .hero-bg {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1582407947304-fd86f028f716?auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
        }
        /* Loading Shimmer Animation */
        .shimmer {
            background: #f6f7f8;
            background-image: linear-gradient(to right, #f6f7f8 0%, #edeef1 20%, #f6f7f8 40%, #f6f7f8 100%);
            background-repeat: no-repeat;
            background-size: 800px 104px;
            animation: placeholderShimmer 1s linear infinite forwards;
        }
        @keyframes placeholderShimmer { 0% { background-position: -468px 0; } 100% { background-position: 468px 0; } }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <nav class="bg-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
            <div class="text-2xl font-bold text-blue-600">MVN Estate</div>
            <div class="hidden md:flex space-x-6 text-gray-600">
                <a href="#" class="hover:text-blue-600">Buy</a>
                <a href="#" class="hover:text-blue-600">Sell</a>
                <a href="#" class="hover:text-blue-600">Community</a>
            </div>
            <button id="postBtn" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">Post Property</button>
        </div>
    </nav>

    <section class="hero-bg h-[400px] flex items-center justify-center text-center text-white px-4">
        <div class="w-full max-w-4xl">
            <h1 class="text-4xl font-bold mb-6">Find Your Place in the Community</h1>
            <div class="bg-white p-2 rounded-xl shadow-2xl flex flex-col md:flex-row gap-2">
                <input type="text" id="searchInput" placeholder="Search City or Locality..." class="flex-1 p-3 text-gray-800 outline-none rounded-lg">
                <button onclick="searchProperties()" class="bg-blue-600 text-white px-8 py-3 rounded-lg font-bold hover:bg-blue-700">Search</button>
            </div>
        </div>
    </section>

    <section class="max-w-7xl mx-auto py-12 px-4">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-bold text-gray-800">Live Community Listings</h2>
            <span id="liveBadge" class="bg-red-100 text-red-600 px-3 py-1 rounded-full text-sm font-bold animate-pulse">● LIVE</span>
        </div>
        
        <div id="listingsGrid" class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="shimmer h-64 rounded-xl"></div>
            <div class="shimmer h-64 rounded-xl"></div>
            <div class="shimmer h-64 rounded-xl"></div>
        </div>
    </section>

    <script>
        // 1. LINK TO BACKEND URL
        const API_URL = 'http://localhost:5000/api/properties';

        // 2. FUNCTION TO FETCH DATA FROM BACKEND
        async function fetchListings() {
            try {
                const response = await fetch(API_URL);
                const properties = await response.json();
                renderProperties(properties);
            } catch (error) {
                console.error('Error connecting to backend:', error);
                document.getElementById('listingsGrid').innerHTML = `
                    <div class="col-span-3 text-center py-10">
                        <p class="text-red-500 font-bold">Backend not connected!</p>
                        <p class="text-gray-500">Make sure your Node.js server is running on port 5000.</p>
                    </div>
                `;
            }
        }

        // 3. FUNCTION TO DISPLAY DATA IN HTML
        function renderProperties(properties) {
            const grid = document.getElementById('listingsGrid');
            grid.innerHTML = ''; // Clear loaders

            if (properties.length === 0) {
                grid.innerHTML = '<p class="col-span-3 text-center text-gray-500">No properties found.</p>';
                return;
            }

            properties.forEach(item => {
                const card = `
                    <div class="bg-white rounded-xl overflow-hidden shadow-md hover:shadow-2xl transition-all border border-gray-100">
                        <img src="${item.images[0] || 'https://via.placeholder.com/400x250'}" class="w-full h-48 object-cover">
                        <div class="p-5">
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="font-bold text-lg text-gray-800">${item.title}</h3>
                                <span class="bg-blue-50 text-blue-600 text-xs px-2 py-1 rounded">${item.category}</span>
                            </div>
                            <p class="text-gray-500 text-sm mb-4"><i class="fas fa-map-marker-alt mr-1"></i> ${item.location}</p>
                            <div class="flex justify-between items-center pt-4 border-t">
                                <span class="text-xl font-bold text-blue-600">₹${item.price.toLocaleString('en-IN')}</span>
                                <button class="text-sm bg-gray-900 text-white px-4 py-2 rounded-md">View Details</button>
                            </div>
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
            });
        }

        // 4. SEARCH FUNCTIONALITY (Links search bar to API)
        async function searchProperties() {
            const query = document.getElementById('searchInput').value;
            const response = await fetch(`${API_URL}?location=${query}`);
            const data = await response.json();
            renderProperties(data);
        }

        // Initial load when page opens
        window.onload = fetchListings;
    </script>
</body>
</html>
